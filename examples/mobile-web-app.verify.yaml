# Example: testing a web app as a real mobile user.
#
# Each `ui` check spins up a real browser engine, emulates a specific
# device (viewport + user agent + touch + pixel ratio), and drives it
# through inline steps. Catches issues that only show up on real phones:
#  - touch-action / overscroll-behavior misconfigurations
#  - mobile viewport meta tag missing → page renders at 980px and looks tiny
#  - clipboard API unavailable on HTTP → paste flow fails silently
#  - elements covered by mobile keyboard or safe-area-inset
#  - JS errors in mobile Safari (different from Chrome)
#  - touch gestures (swipe, long-press) that mouse never fires

checks:
  # The most important version of a check: an Android user
  - name: android-chrome-flow
    type: ui
    engine: chromium
    device: "Pixel 7"           # → mobile UA, 412×915, hasTouch, isMobile, dpr=2.625
    url: "http://127.0.0.1:8000/"
    steps:
      - wait: "main"
      - tap: 'button[type="submit"]'           # real touch tap, not click
      - wait: ".dashboard"
      - long_press: ".item"                     # 600ms hold → context menu?
      - expect_visible: ".context-menu"
      - tap: ".context-menu .delete"
      - sleep: 0.3
      - expect_count: { selector: ".item", n: 0 }

  # An iOS user (different engine entirely, different quirks)
  - name: ios-safari-flow
    type: ui
    engine: webkit                              # → install via `playwright install webkit`
    device: "iPhone 13"
    url: "http://127.0.0.1:8000/"
    steps:
      - wait: "main"
      - tap: 'button[type="submit"]'
      - wait: ".dashboard"

  # iPad — bigger touch viewport, often a different layout breakpoint
  - name: ipad-flow
    type: ui
    engine: webkit
    device: "iPad (gen 7) landscape"
    url: "http://127.0.0.1:8000/"
    steps:
      - wait: ".sidebar"                         # sidebar should be visible at iPad width
      - tap: ".sidebar .nav-settings"

  # Catch predictive-keyboard issues — simulate Gboard's "auto-corrects
  # halfway through typing" behavior that causes double-word insertions
  # in apps that don't suppress IME composition properly.
  - name: predictive-keyboard-doesnt-double-insert
    type: ui
    device: "Pixel 7"
    url: "http://127.0.0.1:8000/chat"
    steps:
      - wait: "#message-input"
      - ime_type:
          selector: "#message-input"
          composition: "helo"                   # what user typed
          commit: "hello"                       # what autocorrect committed
      - expect_text: { selector: "#message-input", equals: "hello" }
      # If the app double-inserts, the value would be "hellohello" or similar

  # Touch scroll: swipe up should reveal content lower in the page
  - name: scroll-with-touch
    type: ui
    device: "Pixel 7"
    url: "http://127.0.0.1:8000/long-page"
    steps:
      - wait: ".top-marker"
      - swipe: { from: [200, 800], to: [200, 200], steps: 30 }
      - expect_visible: ".bottom-marker"
