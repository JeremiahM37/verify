# Example: a Python FastAPI/Flask backend running under systemd.
# Tweak unit names, ports, endpoint paths to match your project.

checks:
  - name: tests
    type: pytest
    run: "pytest -q"

  - name: lint
    type: shell
    run: "ruff check ."

  - name: service-active
    type: systemd
    units: [my-api]

  - name: no-recent-errors
    type: journalctl
    units: [my-api]
    since: "2 min ago"
    forbid: ["ERROR", "Traceback", "CRITICAL"]

  - name: endpoints-healthy
    type: http
    targets:
      - url: "http://127.0.0.1:8000/healthz"
        status: 200
        contains: '"ok":true'
      - url: "http://127.0.0.1:8000/openapi.json"
        status: 200
        contains: '"openapi"'
